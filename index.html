<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Meu IPTV - TV Box</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 28px;
            color: #ff6b35;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            max-height: 45vh;
            overflow-y: auto;
            padding: 5px;
        }
        
        button {
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            background: #2c3e50;
            color: white;
            border: 1px solid #ff6b35;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover, button:focus {
            background: #ff6b35;
            outline: none;
            transform: scale(1.02);
        }
        
        .video-container {
            background: black;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        video {
            width: 100%;
            max-height: 55vh;
            background: black;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .info {
            text-align: center;
            padding: 8px;
            color: #888;
            font-size: 11px;
        }
        
        @media (max-width: 768px) {
            .channel-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            button {
                padding: 10px 6px;
                font-size: 12px;
            }
        }
        
        .channel-grid::-webkit-scrollbar {
            width: 6px;
        }
        .channel-grid::-webkit-scrollbar-track {
            background: #2c3e50;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Meu IPTV - TV Box</h1>
        <div class="channel-grid" id="channel-list"></div>
        <div class="video-container">
            <video id="player" controls autoplay playsinline></video>
        </div>
        <div class="status" id="status">⚡ Selecione um canal</div>
        <div class="info">⚡ Navegue com o controle | Pressione OK para assistir</div>
    </div>

    <script>
        // Lista de canais (mantive apenas alguns para teste - depois você adiciona todos)
        const canais = [
            { nome: "🔴 TESTE - South Park (Pluto TV)", url: "https://service-stitcher.clusters.pluto.tv/v1/stitch/embed/hls/channel/609ae66b359b270007869ff1/master.m3u8?advertisingId=&appName=web&appVersion=unknown&appStoreUrl=&architecture=&buildVersion=&clientTime=0&deviceDNT=0&deviceId=3d53f168-eca6-11ee-861d-aca72e323d0f&deviceMake=Chrome&deviceModel=web&deviceType=web&deviceVersion=unknown" },
            { nome: "🔴 TESTE - Pica Pau", url: "http://ap4x.online/live/ONNEPLAY/0511605511/3787423.m3u8" },
            { nome: "001 UFC FIGHT PASS", url: "http://granpirosh.top/live/841866657/c581b7318b/250112.m3u8" },
            { nome: "002 UFC FIGHT PASS 2", url: "http://granpirosh.top/live/841866657/c581b7318b/555764.m3u8" },
            { nome: "003 FORMULA1(F1)", url: "http://granpirosh.top/live/841866657/c581b7318b/18297.m3u8" }
        ];

        const video = document.getElementById('player');
        const statusDiv = document.getElementById('status');
        let hls = null;

        function playChannel(url) {
            // Limpar player anterior
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
            
            statusDiv.innerHTML = '🔄 Carregando...';
            statusDiv.style.color = '#ffaa44';
            
            console.log('Tentando carregar:', url);
            
            // Método 1: Tentar com HLS.js (mais robusto para redirects)
            if (Hls.isSupported()) {
                hls = new Hls({
                    debug: false,
                    xhrSetup: function(xhr, url) {
                        // Forçar comportamento similar ao navegador
                        xhr.withCredentials = false;
                    }
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    statusDiv.innerHTML = '✅ Reproduzindo';
                    statusDiv.style.color = '#4cae4c';
                    video.play().catch(e => console.log('play error:', e));
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS Error:', data);
                    if (data.fatal) {
                        statusDiv.innerHTML = '❌ Erro: Canal offline ou link inválido';
                        statusDiv.style.color = '#ff5555';
                    }
                });
            } 
            // Método 2: Fallback para player nativo
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('canplay', function() {
                    statusDiv.innerHTML = '✅ Reproduzindo';
                    statusDiv.style.color = '#4cae4c';
                });
                video.play().catch(e => {
                    statusDiv.innerHTML = '❌ Erro: ' + e.message;
                    statusDiv.style.color = '#ff5555';
                });
            } 
            else {
                statusDiv.innerHTML = '❌ Navegador não suporta este formato';
                statusDiv.style.color = '#ff5555';
            }
            
            // Timeout de segurança
            setTimeout(() => {
                if (statusDiv.innerHTML === '🔄 Carregando...') {
                    statusDiv.innerHTML = '⚠️ Demorou muito. Tente outro canal.';
                    statusDiv.style.color = '#ffaa44';
                }
            }, 15000);
        }

        function carregarCanais() {
            const container = document.getElementById('channel-list');
            container.innerHTML = '';
            canais.forEach(canal => {
                const btn = document.createElement('button');
                btn.textContent = canal.nome;
                btn.onclick = () => playChannel(canal.url);
                container.appendChild(btn);
            });
        }

        carregarCanais();
    </script>
</body>
</html>
