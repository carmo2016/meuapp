<!DOCTYPE html>

    <title>Meu IPTV - TV Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 28px;
            color: #ff6b35;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            background: linear-gradient(135deg, #2c3e50 0%, #1a2632 100%);
            color: white;
            border: 1px solid #ff6b35;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        button:hover {
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            transform: scale(1.02);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        /* Estilo para foco em TV Box (navegação por controle remoto) */
        button:focus {
            outline: 3px solid #ff6b35;
            background: #ff6b35;
            transform: scale(1.05);
        }
        
        .video-container {
            background: black;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        video {
            width: 100%;
            max-height: 70vh;
            background: black;
        }
        
        .info {
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .channel-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            button {
                padding: 10px 6px;
                font-size: 12px;
            }
        }
    </style>
</head>
